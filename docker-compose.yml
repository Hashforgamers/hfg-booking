services:
  booking_service:
    build: .
    ports:
      - "5054:5054"
      - "9181:9181"

    environment:
      FLASK_APP: app.py
      FLASK_RUN_HOST: 0.0.0.0
      DEBUG_MODE: "true"

      DATABASE_URI: "postgresql://neondb_owner:Od9UnVJ2Wvfr@ep-patient-sound-a8cq577j-pooler.eastus2.azure.neon.tech/neondb?sslmode=require"

      REDIS_URL: "rediss://red-culflulds78s73bqveqg:h6uqD1Bivbn7K5y3RRSECELE2Jwp2us3@oregon-redis.render.com:6379/0"
      REDIS_SSL: "true"

      MAIL_SERVER: mail.smtp2go.com
      MAIL_PORT: "2525"
      MAIL_USE_TLS: "true"
      MAIL_USE_SSL: "false"
      MAIL_USERNAME: support@hashforgamers.co.in
      MAIL_PASSWORD: "h3b:@yasDm"
      MAIL_DEFAULT_SENDER: support@hashforgamers.co.in

      RAZORPAY_KEY_ID: dummyValue
      RAZORPAY_KEY_SECRET: dummyvalue

      # Cancellation policy defaults (app cancellations)
      CANCELLATION_FEE_ENABLED: "true"
      CANCELLATION_FEE_PERCENT: "5"
      CANCELLATION_FEE_FLAT: "0"
      CANCELLATION_FEE_MIN: "0"
      CANCELLATION_FEE_MAX: "50"
      CANCELLATION_FREE_BEFORE_MINUTES: "180"
      CANCELLATION_FEE_APPLY_ON_PAY_AT_CAFE: "false"
      CANCELLATION_FEE_APPLY_ON_PASS: "false"

      # No-show policy defaults
      NO_SHOW_FEE_ENABLED: "true"
      NO_SHOW_FEE_PERCENT: "100"
      NO_SHOW_FEE_FLAT: "0"
      NO_SHOW_FEE_MIN: "0"
      NO_SHOW_FEE_MAX: "100000"
      NO_SHOW_FEE_APPLY_ON_PAY_AT_CAFE: "false"
      NO_SHOW_FEE_APPLY_ON_PASS: "true"

      # Pass OTP verification policy for dashboard pass redemptions
      PASS_BOOKING_REQUIRE_OTP: "true"
      PASS_BOOKING_OTP_TTL_SECONDS: "300"
      PASS_BOOKING_OTP_RATE_LIMIT_SECONDS: "30"
      PASS_BOOKING_OTP_MAX_ATTEMPTS: "5"
      PASS_BOOKING_VERIFY_TTL_SECONDS: "900"
      PASS_BOOKING_OTP_PUSH_ENABLED: "true"
      USER_NOTIFICATION_ENDPOINT: "https://hfg-user-onboard.onrender.com/api/users/notifications/demo"

    volumes:
      - .:/app

    command: >
      sh -c "
        gunicorn -k eventlet -w 1 app:app -b 0.0.0.0:5054 --timeout 120 &
        rq worker booking_tasks --url \"$$REDIS_URL\" &
        rq-dashboard --redis-url \"$$REDIS_URL\" --port 9181 &
        rqscheduler --url \"$$REDIS_URL\" --interval 60
      "
